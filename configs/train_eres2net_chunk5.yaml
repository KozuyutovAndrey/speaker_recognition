# ERes2Net эксперимент с chunk=5 сек: параллельный run, НЕ заменяет stage2
# Сравниваем val P@10 с train_eres2net_stage2.yaml — берём лучший чекпоинт
# Запуск:
#   bash scripts/run.sh scripts/run_train_eres2net.py \
#       --config configs/train_eres2net_chunk5.yaml --resume --reset-best

experiment_name: eres2net_finetune_chunk5

data:
  data_root: data/
  train_csv: "extracted_data/Для участников/train.csv"
  n_val_speakers: 500
  seed: 42

model:
  emb_dim: 192
  freeze_frontend: false

loss:
  type: subcenter_arcface
  margin: 0.2
  scale: 30.0
  subcenter_k: 3

training:
  bf16: true
  lr: 1.0e-5
  weight_decay: 2.0e-5
  batch_size: 80            # меньше батч из-за длинных чанков (VRAM)
  num_workers: 8
  epochs: 5
  chunk_s: 5.0              # ← эксперимент: 5 сек вместо 3 сек
  warmup_epochs: 0
  grad_clip: 5.0
  target_sr: 16000

augmentation:
  enabled: true
  p_white_noise: 0.2
  p_pink_noise: 0.1
  p_file_noise: 0.5
  p_rir: 0.6
  p_telephone: 0.3
  p_codec: 0.2
  p_speed: 0.3
  p_volume: 0.5
  noise_snr_min: 0
  noise_snr_max: 15
  noise_dir: data/musan_raw/musan/noise
  rir_dir:   data/rir_raw/RIRS_NOISES/simulated_rirs

checkpoint:
  dir: weights/
  save_name: eres2net_chunk5_best.pt
  log_file: results/experiments.jsonl
