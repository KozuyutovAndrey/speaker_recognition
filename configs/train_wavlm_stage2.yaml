# WavLM Large stage2: полный fine-tune с gradient checkpointing
# Запуск:
#   bash scripts/run.sh scripts/run_train_wavlm.py \
#       --config configs/train_wavlm_stage2.yaml \
#       --resume weights/wavlm_stage1_best.pt --reset-best

experiment_name: wavlm_stage2

data:
  data_root: data/
  train_csv: "extracted_data/Для участников/train.csv"
  n_val_speakers: 500
  seed: 42

model:
  emb_dim: 192
  freeze_backbone: false         # stage2: полный fine-tune
  use_grad_checkpointing: true   # экономим VRAM

loss:
  type: subcenter_arcface
  margin: 0.2
  scale: 30.0
  subcenter_k: 3

training:
  bf16: true
  lr: 1.0e-5
  weight_decay: 2.0e-5
  batch_size: 100
  num_workers: 8
  epochs: 10
  chunk_s: 3.0
  warmup_epochs: 0
  grad_clip: 5.0
  target_sr: 16000
  grad_accumulation_steps: 8    # эффективный batch = 64

augmentation:
  enabled: true
  p_white_noise: 0.2
  p_pink_noise: 0.1
  p_file_noise: 0.5
  p_rir: 0.6
  p_telephone: 0.3
  p_codec: 0.2
  p_speed: 0.3
  p_volume: 0.5
  noise_snr_min: 0
  noise_snr_max: 15
  noise_dir: data/musan_raw/musan/noise
  rir_dir:   data/rir_raw/RIRS_NOISES/simulated_rirs

checkpoint:
  dir: weights/
  save_name: wavlm_stage2_best.pt
  log_file: results/experiments.jsonl
